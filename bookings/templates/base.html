<html>
  <body>
    <nav>
        <h1>Emphasoft Hotel</h1>
        <a href="{% url 'room_list' %}">Rooms</a>
        <a href="{% url 'my_bookings' %}">My Bookings</a>
    </nav>
    {% if messages %}
    <div class="messages-container">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}
    <main>
      {% block content %}
      {% endblock %}
    </main>
  </body>
</html>
